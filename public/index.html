    />
    <title>ADHD-CADDI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* MaterialCommunityIcons font for react-native-vector-icons on web */
      /* Self-hosted to avoid CDN dependency */
      @font-face {
        font-family: 'MaterialCommunityIcons';
        src: url('./fonts/MaterialCommunityIcons.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
    </style>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        height: 100%;
        min-height: 100dvh;
        width: 100%;
        background-color: #111111;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }

      #root {
        display: flex;
        flex-direction: column;
      }
    </style>

    <script>
      // Process polyfill for Webpack/Browser compatibility
      // NOTE: Do NOT set NODE_ENV here — webpack DefinePlugin is the sole authority.
      window.process = window.process || {};
      window.process.env = window.process.env || {};
    </script>

    <!-- SPA redirect handling for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present from the 404.html page
      // and converts it back into the correct URL path.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
