name: Android CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android-build-and-test:
    name: Android Build and E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Jest unit tests
        run: npm test -- --watch=false

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Assemble Debug
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Gradle logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-logs
          path: |
            android/app/build/outputs/logs/
            android/build/reports/
          retention-days: 30

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest
        working-directory: android

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-reports
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          retention-days: 30

      - name: Detox E2E Tests
        if: github.event_name == 'workflow_dispatch'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 900
          script: |
            npm run test:e2e:android
        env:
          DETOX_CONFIGURATION: android.debug

      - name: Upload Detox artifacts
        uses: actions/upload-artifact@v4
        if: always() && github.event_name == 'workflow_dispatch'
        with:
          name: detox-artifacts
          path: |
            detox/artifacts/
            detox/*.log
          retention-days: 30

      - name: Upload emulator logcat
        uses: actions/upload-artifact@v4
        if: always() && github.event_name == 'workflow_dispatch'
        with:
          name: emulator-logcat
          path: artifacts/logcat.log
          retention-days: 30

  android-release-build:
    name: Android Release Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: android-build-and-test
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Assemble Release
        run: ./gradlew assembleRelease
        working-directory: android
        env:
          # Use debug signing for CI check (real release needs keystore)
          ANDROID_SIGNING_ENABLED: false

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Verify APK launches
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -eu
            APK=android/app/build/outputs/apk/release/app-release.apk
            echo "Waiting for emulator to be available..."
            adb wait-for-device

            # Wait for boot_completed (up to 10 min); restart adb server only when offline
            for i in $(seq 1 60); do
              BOOT=$(adb -s emulator-5554 shell getprop sys.boot_completed 2>/dev/null || echo "offline")
              if [ "$BOOT" = "1" ]; then
                echo "Emulator booted."
                break
              fi
              echo "Emulator not ready yet (attempt $i). status=$BOOT"
              if [ "$BOOT" = "offline" ]; then
                adb kill-server || true
                adb start-server || true
              fi
              sleep 10
            done

            adb devices

            # Retry install up to 3 times to handle transient broken pipe
            INSTALLED=0
            for attempt in 1 2 3; do
              echo "Installing APK (attempt $attempt)..."
              if adb install -r "$APK"; then
                echo "APK installed."
                INSTALLED=1
                break
              fi
              echo "Install failed (attempt $attempt). Retrying..."
              sleep 5
              adb kill-server || true
              adb start-server || true
            done
            if [ "$INSTALLED" -ne 1 ]; then
              echo "APK installation failed after retries."
              exit 1
            fi

            # Launch the app and verify activity is visible
            adb shell am start -n com.adhdcaddi/.MainActivity
            sleep 10
            if ! adb shell dumpsys window windows | grep -i "com.adhdcaddi"; then
              echo "com.adhdcaddi was not found in the active window dump."
              exit 1
            fi
